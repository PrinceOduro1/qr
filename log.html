<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visitor Log</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #faf8f3;
    padding: 20px;
    color: #1a1a2e;
  }

  h1 {
    text-align: center;
    color: #0f2044;
  }

  .toolbar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
    flex-wrap: wrap;
    gap: 10px;
  }

  input {
    padding: 8px 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    width: 250px;
  }

  button {
    padding: 8px 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  .export { background: #2d6a4f; color: white; }
  .clear { background: #e74c3c; color: white; }

  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
  }

  th {
    background: #0f2044;
    color: white;
    padding: 10px;
  }

  td {
    padding: 10px;
    border-bottom: 1px solid #eee;
  }

  tr:nth-child(even) {
    background: #f5f5f5;
  }

  .status-in { color: green; font-weight: bold; }
  .status-out { color: orange; font-weight: bold; }

  .empty {
    text-align: center;
    padding: 40px;
    color: #777;
  }
</style>
</head>
<body>

<!-- 🔐 OPTIONAL PASSWORD -->
<script>
const password = "admin123";
const input = prompt("Enter password to access visitor log:");

if (input !== password) {
  alert("Access denied");
  window.location.href = "index.html";
}
</script>

<h1>Visitor Log</h1>

<div class="toolbar">
  <input type="text" id="search" placeholder="Search name, org, host..." oninput="renderLog()">

  <div>
    <button class="export" onclick="exportCSV()">Export CSV</button>
    <button class="clear" onclick="clearLog()">Clear</button>
  </div>
</div>

<div id="log-container"></div>

<script>
let visitors = JSON.parse(localStorage.getItem('visitorLog') || '[]');

function save() {
  localStorage.setItem('visitorLog', JSON.stringify(visitors));
}

function renderLog() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = visitors.filter(v =>
    v.name.toLowerCase().includes(q) ||
    v.org.toLowerCase().includes(q) ||
    v.host.toLowerCase().includes(q)
  );

  const container = document.getElementById('log-container');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">No visitor records found</div>';
    return;
  }

  container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Date</th>
          <th>Name</th>
          <th>Phone</th>
          <th>Email</th>
          <th>Organization</th>
          <th>Host</th>
          <th>Purpose</th>
          <th>Time In</th>
          <th>Time Out</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.map((v, i) => `
          <tr>
            <td>${filtered.length - i}</td>
            <td>${v.date}</td>
            <td><b>${v.name}</b></td>
            <td>${v.phone}</td>
            <td>${v.email}</td>
            <td>${v.org}</td>
            <td>${v.host}</td>
            <td>${v.purpose}</td>
            <td>${v.timeIn}</td>
            <td>${v.timeOut || '-'}</td>
            <td class="${v.timeOut ? 'status-out' : 'status-in'}">
              ${v.timeOut ? 'Signed Out' : 'On Site'}
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function clearLog() {
  if (!confirm("Clear all visitor records?")) return;
  visitors = [];
  save();
  renderLog();
}

function exportCSV() {
  if (visitors.length === 0) {
    alert("No data to export");
    return;
  }

  const headers = [
    "Date","Name","Phone","Email","Organization",
    "Host","Purpose","Time In","Time Out","Status"
  ];

  const rows = visitors.map(v => [
    v.date,
    v.name,
    v.phone,
    v.email,
    v.org,
    v.host,
    v.purpose,
    v.timeIn,
    v.timeOut || '',
    v.timeOut ? "Signed Out" : "On Site"
  ]);

  const csv = [headers, ...rows]
    .map(r => r.map(x => `"${x}"`).join(","))
    .join("\n");

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "visitor-log.csv";
  a.click();

  URL.revokeObjectURL(url);
}

/* Load on open */
renderLog();
</script>

</body>
</html>
